appId: com.israelgarcia.gymbar
productName: GymBar
directories:
  output: dist-release
  buildResources: build
files:
  - out/**/*
  - package.json
extraResources:
  - from: skills
    to: skills
  - from: build/trayIconTemplate.png
    to: trayIconTemplate.png
  - from: build/trayIconTemplate@2x.png
    to: trayIconTemplate@2x.png
mac:
  category: public.app-category.healthcare-fitness
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip # requerido por electron-updater en macOS
      arch: [arm64, x64]
  # Para auto-update real en macOS se necesita firma + notarización:
  # exporta CSC_LINK / CSC_KEY_PASSWORD y APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD /
  # APPLE_TEAM_ID en el CI. Sin firma, la app degrada a aviso manual de update.
win:
  target: nsis
nsis:
  oneClick: true
  perMachine: false
publish:
  provider: github
  owner: tonderflash
  repo: gym-desktop
  releaseType: release # publica directo (sin quedar en draft) para que electron-updater lo vea
